name: Build Windows EXE

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run make

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: out/make/**
